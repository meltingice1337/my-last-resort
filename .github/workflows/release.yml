name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-release-

      - name: Build CLI
        run: cargo build --release -p vault-cli

      - name: Package binary
        run: |
          cd target/release
          tar czf vault-linux-amd64.tar.gz vault
          sha256sum vault-linux-amd64.tar.gz > vault-linux-amd64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/vault-linux-amd64.tar.gz
            target/release/vault-linux-amd64.tar.gz.sha256
