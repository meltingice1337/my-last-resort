name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-release-

      - name: Build CLI
        run: cargo build --release -p vault-cli

      - name: Prepare binary
        run: |
          cp target/release/vault target/release/vault-linux-amd64
          sha256sum target/release/vault-linux-amd64 > target/release/vault-linux-amd64.sha256

      - name: Extract changelog from tag
        id: changelog
        run: |
          git fetch --tags --force
          echo 'body<<EOF' >> "$GITHUB_OUTPUT"
          git tag -l --format='%(contents:body)' "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            target/release/vault-linux-amd64
            target/release/vault-linux-amd64.sha256
